services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      # Community services used here: s3, lambda, dynamodb, iam, logs.
      # As of 2026.03, LocalStack requires an auth token even for the free tier.
      # Get a free (non-commercial) token at https://app.localstack.cloud and
      # export it: `export LOCALSTACK_AUTH_TOKEN=...` before docker compose up.
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
      - DEBUG=1
      - LAMBDA_REMOVE_CONTAINERS=true
    volumes:
      # Lambda runs in its own container, so LocalStack needs the Docker socket.
      - "/var/run/docker.sock:/var/run/docker.sock"
