name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest tests/test_handler.py -v

  integration-localstack:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: pip install -r requirements-dev.txt terraform-local awscli-local

      - name: Start LocalStack
        uses: localstack/setup-localstack@v1
        with:
          image-tag: "latest"
          install-awslocal: "true"
        # No LOCALSTACK_AUTH_TOKEN needed: s3/lambda/dynamodb are community.

      - name: Build Lambda package
        run: bash scripts/build.sh

      - name: Deploy to LocalStack
        run: |
          tflocal -chdir=infra init -input=false
          tflocal -chdir=infra apply -auto-approve -input=false -var="enable_rekognition=false"

      - name: Run integration test
        run: pytest tests/integration -v
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
