name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest tests/test_handler.py -v

  integration-localstack:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: pip install -r requirements-dev.txt terraform-local awscli-local

      - name: Start LocalStack
        # Use the repo's own compose file so CI matches local dev exactly.
        # As of 2026.03 LocalStack needs an auth token even for free services.
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker compose up -d
          echo "Waiting for LocalStack to report healthy..."
          ok=""
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:4566/_localstack/health >/dev/null 2>&1; then
              ok=1; echo "LocalStack is up"; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "::error::LocalStack did not become healthy. Container logs:"
            docker compose logs localstack
            exit 1
          fi

      - name: Build Lambda package
        run: bash scripts/build.sh

      - name: Deploy to LocalStack
        run: |
          tflocal -chdir=infra init -input=false
          tflocal -chdir=infra apply -auto-approve -input=false -var="enable_rekognition=false"

      - name: Run integration test
        run: pytest tests/integration -v
        env:
          AWS_ENDPOINT_URL: http://127.0.0.1:4566
