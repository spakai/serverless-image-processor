name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest tests/test_handler.py -v

  integration-localstack:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: pip install -r requirements-dev.txt terraform-local awscli-local

      - name: Start LocalStack
        # Use the repo's own compose file so CI matches local dev exactly.
        # s3 / lambda / dynamodb / iam are community services, no token needed.
        run: |
          docker compose up -d
          echo "Waiting for LocalStack to report healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1; then
              echo "LocalStack is up"; break
            fi
            sleep 2
          done

      - name: Build Lambda package
        run: bash scripts/build.sh

      - name: Deploy to LocalStack
        run: |
          tflocal -chdir=infra init -input=false
          tflocal -chdir=infra apply -auto-approve -input=false -var="enable_rekognition=false"

      - name: Run integration test
        run: pytest tests/integration -v
        env:
          AWS_ENDPOINT_URL: http://localhost:4566